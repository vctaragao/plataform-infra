name: Apply Atlantis Manifests

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-atlantis-manifests.yml'
      - 'k8s/atlantis/**'
  issue_comment:
    types:
      - created
  workflow_dispatch:

concurrency:
  group: apply-atlantis-manifests-${{ github.event_name == 'issue_comment' && 'development' || 'production' }}
  cancel-in-progress: true

jobs:
  apply-atlantis-manifests:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.body == '.deploy-atlantis'
      )
    name: Apply Atlantis Manifests
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'issue_comment' && 'development' || 'production' }}
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    env:
      TARGET_ENVIRONMENT: ${{ github.event_name == 'issue_comment' && 'development' || 'production' }}
      GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
      GKE_LOCATION: ${{ vars.GKE_LOCATION }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_ACCOUNT: ${{ vars.SERVICE_ACCOUNT }}
      ATLANTIS_BOT_PA_TOKEN: ${{ secrets.ATLANTIS_BOT_PA_TOKEN }}
      ATLANTIS_WEBHOOK: ${{ secrets.ATLANTIS_WEBHOOK }}

    steps:
      - id: pr
        name: Resolve pull request revision
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            if (pr.data.state !== 'open') {
              core.setFailed('Only open pull requests can be deployed to development.');
              return;
            }

            if (pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed('Pull request deployments from forks are not allowed.');
              return;
            }

            core.setOutput('sha', pr.data.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.pr.outputs.sha || github.sha }}

      - name: Validate workflow configuration
        run: |
          set -euo pipefail
          missing=0

          for var_name in \
            GKE_CLUSTER \
            GKE_LOCATION \
            WORKLOAD_IDENTITY_PROVIDER \
            SERVICE_ACCOUNT \
            ATLANTIS_BOT_PA_TOKEN \
            ATLANTIS_WEBHOOK
          do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub environment value: ${var_name}" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Configure the missing values in the GitHub Environment for the ${TARGET_ENVIRONMENT} environment." >&2
            exit 1
          fi

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Ensure Atlantis webhook secret
        run: |
          set -euo pipefail
          kubectl create secret generic atlantis-webhook \
            --namespace default \
            --from-literal=github_token="${ATLANTIS_BOT_PA_TOKEN}" \
            --from-literal=github_secret="${ATLANTIS_WEBHOOK}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Update Atlantis Helm release
        run: |
          set -euo pipefail
          helm repo add runatlantis https://runatlantis.github.io/helm-charts
          helm repo update
          helm upgrade --install atlantis runatlantis/atlantis -n default -f k8s/atlantis/values.yaml

      - name: Apply Atlantis GKE resources
        run: |
          set -euo pipefail
          kubectl apply -f k8s/atlantis/managed-certificate.yaml
          kubectl apply -f k8s/atlantis/ingress.yaml

      - name: Verify Atlantis resources
        run: |
          set -euo pipefail
          kubectl get pods -n default -l app=atlantis
          kubectl get svc -n default atlantis
          kubectl get managedcertificate -n default atlantis-cert
          kubectl get ingress -n default atlantis
          helm test atlantis -n default
